<html><!-- 開始 HTML 文件 -->
    <head><!-- 開始頁面頭部資訊 -->
        <meta charset="utf-8" /><!-- 設定頁面字符編碼為 UTF-8 -->
        <title>登入範例</title> <!-- 設定頁面標題為 "登入範例" -->
    </head><!-- 結束頁面頭部資訊 -->
    <body><!-- 開始頁面主體 -->
        <form method=post action="10.login.php"><!-- 開始表單，使用 POST 方法，表單資料將送到 "10.login.php" -->
            帳號：<input type=text name="id"><br /><!-- 文字輸入框，讓使用者輸入帳號，名稱為 "id" -->
            密碼：<input type=password name="pwd"><p></p><!-- 密碼輸入框，讓使用者輸入密碼，名稱為 "pwd" -->
            <input type=submit value="登入"><!-- 提交按鈕，點擊後送出表單資料 -->         
            <input type=reset value="清除"> <!-- 取消按鈕，點擊後清除表單資料 -->   
        </form><!-- 結束表單 -->
    </body><!-- 結束頁面主體 -->
</html><!-- 結束 HTML 文件 -->
